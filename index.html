<!DOCTYPE html>
<html lang="en" dir="ltr">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <meta charset="utf-8">
        <meta name="keywords" content="jewel, gem, match 3, simulator, idle">
        <title>Jewel Simulator Idle 2026</title>
        <link rel="icon" href="favicon.png">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Fira+Sans:wght@400;700">
        <link rel="stylesheet" type="text/css" href="style.css">
    </head>
    <body>
        <main>
            <div id="game_panel">
                <p id="level">
                    LEVEL 1
                </p>
                <div id="level_progress"></div>
                <p id="score">
                    0
                </p>
                <p id="cascades">
                    &nbsp;
                </p>
                <div id="gem_grid" class="status_idle">
                    <p id="level_end">
                        LEVEL 1<br>COMPLETE
                    </p>
                </div>
                <p id="boost">
                    x1
                </p>
                <div id="boost_progress"></div>
                <p id="lives">
                    ❤❤❤
                </p>
            </div>
            <div id="highscore_panel">
                <p id="highscore_title">
                    HIGHSCORES
                </p>
                <p id="highscores">
                    #1 - LEVEL 1 - 0
                    <br>#2 - LEVEL 1 - 0
                    <br>#3 - LEVEL 1 - 0
                    <br>#4 - LEVEL 1 - 0
                    <br>#5 - LEVEL 1 - 0
                    <br>#6 - LEVEL 1 - 0
                    <br>#7 - LEVEL 1 - 0
                    <br>#8 - LEVEL 1 - 0
                    <br>#9 - LEVEL 1 - 0
                    <br>#10 - LEVEL 1 - 0
                </p>
                <div class="center_button">
                    <button id="new_game" onclick="new_game()">
                        NEW GAME
                    </button>
                </div>
            </div>
        </main>
        <script src="main.js" charset="utf-8" type="text/javascript"></script>
    </body>
</html>
